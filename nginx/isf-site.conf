server {
    listen 80;
    server_name www.isf.com.br isf.com.br;

    # Tamanho máximo para upload de imagens
    client_max_body_size 10m;

    # Arquivos estáticos do Next.js com cache longo
    location /_next/static/ {
        alias /var/www/isf-site/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Arquivos públicos (uploads, imagens, etc.)
    location /uploads/ {
        alias /var/www/isf-site/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Proxy reverso para o Next.js (PM2 na porta 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
