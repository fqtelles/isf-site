# Redirect www → non-www (301 permanente para SEO)
server {
    listen 80;
    server_name www.isf.com.br;
    return 301 https://isf.com.br$request_uri;
}

# Redirect HTTP → HTTPS (caso Certbot não cubra)
server {
    listen 80;
    server_name isf.com.br;
    return 301 https://isf.com.br$request_uri;
}

server {
    listen 443 ssl;
    server_name www.isf.com.br;

    # Certbot gerencia os certs — ajustar paths se necessário
    ssl_certificate /etc/letsencrypt/live/isf.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/isf.com.br/privkey.pem;

    return 301 https://isf.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    server_name isf.com.br;

    # SSL — Certbot gerencia os certs
    ssl_certificate /etc/letsencrypt/live/isf.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/isf.com.br/privkey.pem;

    # Tamanho máximo para upload de imagens
    client_max_body_size 10m;

    # ─── Gzip Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # ─── Security Headers ───
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Arquivos estáticos do Next.js com cache longo
    location /_next/static/ {
        alias /var/www/isf-site/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Arquivos públicos (uploads, imagens, etc.)
    location /uploads/ {
        alias /var/www/isf-site/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon, robots, sitemap — cache curto
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Proxy reverso para o Next.js (PM2 na porta 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
